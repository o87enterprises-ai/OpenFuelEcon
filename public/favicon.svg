<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="FuelEcon">
  <title>FuelEcon</title>
  <!-- Rounded-square backdrop in forest green -->
  <rect width="100" height="100" rx="22" fill="#1A5F3F"/>
  <!-- Fuel droplet in lime-green accent -->
  <path
    d="M50 14
       C 30 40, 24 58, 24 68
       A 26 26 0 0 0 76 68
       C 76 58, 70 40, 50 14 Z"
    fill="#B8E23A"/>
  <!-- F monogram, bottom-anchored inside droplet -->
  <text
    x="50" y="76"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-weight="900"
    font-size="36"
    fill="#1A5F3F"
    letter-spacing="-1">F</text>
</svg>
