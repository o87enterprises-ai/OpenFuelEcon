name = "fuelecon-maintenance-agent"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Trigger every day at 06:00 UTC
[triggers]
crons = ["0 6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "fuelecon-db"
database_id = "79957c86-6186-4db0-ade1-71b85311e9ed"

[vars]
ENVIRONMENT = "production"
# EIA_API_KEY should be set via: wrangler secret put EIA_API_KEY
