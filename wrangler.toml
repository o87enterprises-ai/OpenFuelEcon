# --------------------------------------------------------
# Phase 4 addition (daily maintenance agent)
# Cron runs at 06:00 UTC — runs against a separate Worker,
# not this Pages project. See agent/wrangler.toml.
# --------------------------------------------------------

# --------------------------------------------------------
# Secrets (set via `wrangler pages secret put <NAME>`)
#   EIA_API_KEY        — gas prices (eia.gov)
#   GOOGLE_INDEXING_KEY — Indexing API for daily agent pings
#   ADSENSE_CLIENT_ID  — AdSense publisher ID after approval
# --------------------------------------------------------
